# =============================================
# AI News Links Configuration
# =============================================
# Add a new category block and restart ? it auto-appears as a card.
#
# Required keys per category:
#   cat.<key>.url    = link URL
#   cat.<key>.icon   = emoji icon
#   cat.<key>.tag    = short label
#   cat.<key>.title  = card title
#   cat.<key>.desc   = card description
#   cat.<key>.color  = tag color (ai|ml|rpa|llm|vis)
#   cat.<key>.order  = display order (1,2,3...)
# =============================================

# Main site (hero banner)
main.url=https://www.artificialintelligence-news.com/
main.title=Artificial Intelligence News
main.description=Your go-to source for the latest AI, ML, Robotics & Automation news

# --- Categories ---

cat.ai.url=https://www.artificialintelligence-news.com/categories/ai/
cat.ai.icon=\uD83E\uDD16
cat.ai.tag=AI
cat.ai.title=Artificial Intelligence
cat.ai.desc=Latest breakthroughs in AI research, models, and real-world applications.
cat.ai.color=ai
cat.ai.order=1

