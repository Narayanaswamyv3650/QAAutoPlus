# Application Configuration
app.name=QA Auto Plus
app.version=1.0.0

# Server Configuration
server.port=8088

# Logging Configuration
logging.level=INFO

# =============================================
# Email / Newsletter Subscription
# =============================================
# Gmail SMTP ? uses App Password (NOT your regular password).
# How to get an App Password:
#   1. Enable 2-Step Verification: https://myaccount.google.com/security
#   2. Create App Password: https://myaccount.google.com/apppasswords
#   3. Select "Mail" ? "Other (QAAutoPlus)" ? Generate
#   4. Paste the 16-char password below (no spaces)
#
mail.smtp.host=smtp.gmail.com
mail.smtp.port=587
mail.smtp.auth=true
mail.smtp.starttls=true
mail.from=jonnalanarayanaswamy@gmail.com
mail.password=03Aprl1995!@#$%
mail.notify.to=jonnalanarayanaswamy@gmail.com

# =============================================
# RSS Feed Sources ? fetched every 15 min
# =============================================
# Format: feeds.<categoryId>=<RSS URL>
# The categoryId must match a category id in site-config.json
feeds.ai=https://techcrunch.com/category/artificial-intelligence/feed/
feeds.ml=https://news.mit.edu/topic/machine-learning/feed
feeds.vision=https://techcrunch.com/tag/computer-vision/feed/
feeds.startups=https://techcrunch.com/category/startups/feed/
feeds.apps=https://techcrunch.com/category/apps/feed/
feeds.security=https://techcrunch.com/category/security/feed/
feeds.robotics=https://techcrunch.com/category/robotics/feed/
feeds.ethics=https://techcrunch.com/tag/ai-ethics/feed/
feeds.trending=https://techcrunch.com/feed/

# How many articles to fetch per category
feeds.maxPerCategory=3
# Cache TTL in minutes
feeds.cacheTtlMinutes=15
